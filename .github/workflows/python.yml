name: Python

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Python quality and package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: 0.11.30
          python-version: "3.14"
          enable-cache: true

      - name: Synchronize locked environment
        run: uv sync --locked --python 3.14

      - name: Check formatting
        run: uv run --locked --no-sync ruff format --check .

      - name: Lint
        run: uv run --locked --no-sync ruff check .

      - name: Type-check
        run: uv run --locked --no-sync pyrefly check --output-format github

      - name: Check package boundaries
        run: uv run --locked --no-sync lint-imports --no-cache

      - name: Check dependency licenses
        run: >-
          uv run --locked --no-sync pip-licenses
          --from mixed
          --allow-only
          "Apache-2.0;Apache-2.0 OR BSD-2-Clause;Apache-2.0 OR BSD-3-Clause;Apache Software License;BSD-2-Clause;BSD-3-Clause;BSD License;MIT;MIT-0;MIT License;MPL-2.0;PSF-2.0"

      - name: Build distributions
        run: uv build --clear --no-sources

      - name: Verify distributions
        run: uv run --locked --no-sync python scripts/verify_distribution.py dist

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error

  tests:
    name: Python ${{ matrix.python }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: 0.11.30
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Synchronize locked environment
        run: uv sync --locked --python "$PYTHON_VERSION"

      - name: Run tests with branch coverage
        run: uv run --locked --no-sync --python "$PYTHON_VERSION" pytest

      - name: Enforce critical domain coverage
        run: >-
          uv run --locked --no-sync --python "$PYTHON_VERSION" coverage report
          --include="src/cqmgr/domain/status.py,src/cqmgr/domain/results.py,src/cqmgr/domain/redaction.py,src/cqmgr/domain/plans.py,src/cqmgr/domain/plan_consumption.py,src/cqmgr/adapters/serialization/plans.py"
          --fail-under=100

  package-smoke:
    name: ${{ matrix.os }} package smoke
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-22.04
          - windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: 0.11.30
          python-version: "3.14"
          enable-cache: true

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist

      - name: Provision ephemeral Linux Secret Service
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update &&
          sudo apt-get install --no-install-recommends --yes
          dbus-x11 gnome-keyring

      - name: Exercise native persistence contracts
        run: >-
          uv run --locked --python 3.14 pytest --no-cov -q
          tests/plans/test_plan_repository.py
          -k "concurrent_processes_obtain_at_most_one_lease_and_call_no_provider or
          process_crash_releases_os_lock_without_deleting_shared_state or
          concurrent_different_exports_never_overwrite or
          foreign_key_is_rejected_across_processes_before_provider_dispatch or
          windows_repository_replaces_every_explicit_plan_reader"

      - name: Smoke-test installed artifacts and native keyring
        if: runner.os != 'Linux'
        run: >-
          uv run --python 3.14 python scripts/smoke_tool_install.py
          dist --python 3.14 --native-keyring-round-trip

      - name: Smoke-test installed artifacts with Linux Secret Service
        if: runner.os == 'Linux'
        shell: bash
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            export XDG_RUNTIME_DIR="${RUNNER_TEMP}/cqmgr-keyring-runtime"
            mkdir -p "${XDG_RUNTIME_DIR}"
            chmod 700 "${XDG_RUNTIME_DIR}"
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            uv run --python 3.14 python scripts/smoke_tool_install.py \
              dist --python 3.14 --native-keyring-round-trip
          '
